<!DOCTYPE html>
<!--
  Go vanity import meta page for go.neatlogs.com.

  Serve this file for go.neatlogs.com AND every subpath (go.neatlogs.com/*),
  so `go get go.neatlogs.com/...` resolves. The go-import meta tag points the
  Go toolchain at the real repository on GitHub; the go-source tag gives
  pkg.go.dev clickable source links.

  Both the root module (go.neatlogs.com) and submodules (e.g.
  go.neatlogs.com/contrib/adk) live in the same GitHub repo, so one tag covers
  all of them.
-->
<html>
<head>
  <meta charset="utf-8">
  <meta name="go-import" content="go.neatlogs.com git https://github.com/neatlogs/neatlogs-go">
  <meta name="go-source" content="go.neatlogs.com https://github.com/neatlogs/neatlogs-go https://github.com/neatlogs/neatlogs-go/tree/main{/dir} https://github.com/neatlogs/neatlogs-go/blob/main{/dir}/{file}#L{line}">
  <meta http-equiv="refresh" content="0; url=https://pkg.go.dev/go.neatlogs.com">
</head>
<body>
  Redirecting to <a href="https://pkg.go.dev/go.neatlogs.com">pkg.go.dev/go.neatlogs.com</a>…
</body>
</html>
